{% extends "base_setup.html" %}
{% block content %}
<h2>Home Assistant Connection</h2>
<p style="color: #94a3b8; margin-bottom: 1rem;">Enter your HA instance URL and Long-Lived Access Token.</p>
<form method="post" action="/setup/step/2" id="ha-form">
    <label for="ha_url">HA URL</label>
    <input type="url" id="ha_url" name="ha_url" placeholder="http://homeassistant.local:8123" required>
    <label for="ha_token">Long-Lived Access Token</label>
    <input type="password" id="ha_token" name="ha_token" required>
    <button type="button" class="btn-secondary"
        hx-post="/setup/test/ha"
        hx-include="#ha-form"
        hx-target="#test-result"
        hx-swap="innerHTML">Test Connection</button>
    <div id="test-result"></div>
    <br>
    <button type="submit" class="btn-primary">Next</button>
</form>
{% endblock %}
