<div class="auth-card">
    <div class="auth-card-header">
        <svg class="auth-card-icon" width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path d="M12 2a7 7 0 017 7c0 3-2 5.5-4 7l-1.5 1.5a2.12 2.12 0 01-3 0L9 16c-2-1.5-4-4-4-7a7 7 0 017-7z"/>
            <circle cx="12" cy="9" r="2"/>
            <path d="M8 21h8"/>
        </svg>
        <h1 class="auth-card-title">{% block auth_title %}HA-AgentHub{% endblock %}</h1>
    </div>
    <div class="auth-card-body">
        {% block auth_body %}{% endblock %}
    </div>
    <div class="auth-card-footer">
        {% block auth_footer %}{% endblock %}
    </div>
</div>
