{% extends "dashboard_base.html" %}
{% block page_title %}Rewrite Config{% endblock %}
{% block nav_rewrite %}active{% endblock %}
{% block header_title %}Rewrite Agent Configuration{% endblock %}
{% block page_content %}
<div x-data="rewritePage()" x-init="loadConfig()">
    <div class="card" style="max-width: 600px;">
        <h3 style="margin-bottom: 1rem;">Rewrite Settings</h3>

        <div class="form-group" style="display: flex; align-items: center; gap: 0.75rem;">
            <label class="form-label" style="margin-bottom: 0;">Enabled</label>
            <label class="toggle">
                <input type="checkbox" x-model="config.enabled">
                <span class="toggle-slider"></span>
            </label>
        </div>

        <div class="form-group">
            <label class="form-label">Model</label>
            <input type="text" class="form-input" x-model="config.model" placeholder="e.g. groq/llama-3.1-8b-instant">
        </div>

        <div class="form-group">
            <label class="form-label">Temperature: <span class="mono" x-text="config.temperature"></span></label>
            <input type="range" min="0" max="2" step="0.1" x-model.number="config.temperature">
        </div>

        <div style="display: flex; align-items: center; gap: 0.75rem; margin-top: 1rem;">
            <button class="btn btn-primary" @click="saveConfig()">Save Changes</button>
            <span x-show="saved" style="color: var(--green); font-size: 0.875rem;">Saved</span>
            <span x-show="error" style="color: var(--red); font-size: 0.875rem;" x-text="error"></span>
        </div>
    </div>
</div>

<script>
function rewritePage() {
    return {
        config: { enabled: false, model: "", temperature: 0.7 },
        saved: false,
        error: "",
        async loadConfig() {
            try {
                var resp = await fetch("/api/admin/rewrite/config", { credentials: "same-origin" });
                if (resp.ok) {
                    this.config = await resp.json();
                }
            } catch(e) {
                console.error("Failed to load rewrite config", e);
            }
        },
        async saveConfig() {
            this.saved = false;
            this.error = "";
            try {
                var resp = await fetch("/api/admin/rewrite/config", {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    credentials: "same-origin",
                    body: JSON.stringify(this.config)
                });
                if (resp.ok) {
                    this.saved = true;
                    var self = this;
                    setTimeout(function() { self.saved = false; }, 2000);
                } else {
                    this.error = "Failed to save";
                }
            } catch(e) {
                this.error = "Network error";
            }
        }
    };
}
</script>
{% endblock %}
