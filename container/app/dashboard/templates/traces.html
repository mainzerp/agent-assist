{% extends "dashboard_base.html" %}
{% block page_title %}Traces{% endblock %}
{% block nav_traces %}active{% endblock %}
{% block header_title %}Request Traces{% endblock %}
{% block page_content %}
<!-- vis.js Timeline CDN (only loaded on this page) -->
<link href="https://unpkg.com/vis-timeline@7.7.3/styles/vis-timeline-graph2d.min.css" rel="stylesheet" type="text/css">
<script src="https://unpkg.com/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"></script>

<div x-data="tracesPage()" x-init="loadTraces()">

    <!-- Trace list -->
    <div class="card" style="margin-bottom: 1.5rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h3>Recent Traces</h3>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
                <button class="btn btn-sm btn-secondary" :disabled="page <= 1" @click="page--; loadTraces()">Prev</button>
                <span class="mono" style="font-size: 0.875rem;" x-text="page + ' / ' + pages"></span>
                <button class="btn btn-sm btn-secondary" :disabled="page >= pages" @click="page++; loadTraces()">Next</button>
            </div>
        </div>

        <template x-if="loading">
            <p style="color: var(--text-secondary);">Loading traces...</p>
        </template>

        <table class="data-table" x-show="!loading && traces.length > 0">
            <thead>
                <tr>
                    <th>Trace ID</th>
                    <th>Start Time</th>
                    <th>Spans</th>
                    <th>Duration</th>
                    <th>Agents</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <template x-for="t in traces" :key="t.trace_id">
                    <tr>
                        <td class="mono" style="font-size: 0.75rem;" x-text="t.trace_id"></td>
                        <td class="mono" style="font-size: 0.75rem;" x-text="t.start_time"></td>
                        <td x-text="t.span_count"></td>
                        <td class="mono" x-text="t.total_duration_ms ? Math.round(t.total_duration_ms) + 'ms' : '-'"></td>
                        <td style="font-size: 0.75rem;" x-text="t.agents || '-'"></td>
                        <td>
                            <button class="btn btn-sm btn-primary" @click="showGantt(t.trace_id)">View</button>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>

        <template x-if="!loading && traces.length === 0">
            <p style="color: var(--text-secondary);">No traces found.</p>
        </template>
    </div>

    <!-- Gantt visualization -->
    <template x-if="selectedTrace">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3>Trace: <span class="mono" x-text="selectedTrace"></span></h3>
                <button class="btn btn-sm btn-secondary" @click="selectedTrace = null; ganttSpans = [];">Close</button>
            </div>
            {% include "partials/_trace_gantt.html" %}
        </div>
    </template>
</div>

<script>
function tracesPage() {
    return {
        traces: [],
        loading: false,
        page: 1,
        pages: 1,
        total: 0,
        selectedTrace: null,
        ganttSpans: [],
        timeline: null,

        async loadTraces() {
            this.loading = true;
            try {
                const resp = await fetch('/api/admin/traces?page=' + this.page + '&per_page=50');
                const data = await resp.json();
                this.traces = data.traces || [];
                this.total = data.total || 0;
                this.pages = data.pages || 1;
            } catch (e) {
                console.error('Failed to load traces', e);
            }
            this.loading = false;
        },

        async showGantt(traceId) {
            this.selectedTrace = traceId;
            try {
                const resp = await fetch('/api/admin/traces/' + encodeURIComponent(traceId));
                const data = await resp.json();
                this.ganttSpans = data.spans || [];
                this.$nextTick(() => { this.renderGantt(); });
            } catch (e) {
                console.error('Failed to load trace spans', e);
            }
        },

        renderGantt() {
            const container = document.getElementById('gantt-container');
            if (!container || this.ganttSpans.length === 0) return;

            if (this.timeline) {
                this.timeline.destroy();
                this.timeline = null;
            }

            const items = this.ganttSpans.map((span, idx) => {
                const start = new Date(span.start_time);
                const end = new Date(start.getTime() + span.duration_ms);
                const color = span.status === 'error' ? '#ef4444' : '#3b82f6';
                return {
                    id: idx,
                    content: span.span_name + (span.agent_id ? ' (' + span.agent_id + ')' : '') + ' [' + Math.round(span.duration_ms) + 'ms]',
                    start: start,
                    end: end,
                    style: 'background-color: ' + color + '; color: white; border: none; border-radius: 4px; font-size: 0.75rem;',
                    title: span.span_name + '\nDuration: ' + span.duration_ms.toFixed(2) + 'ms\nStatus: ' + span.status,
                };
            });

            const dataset = new vis.DataSet(items);
            const options = {
                height: '250px',
                stack: true,
                showCurrentTime: false,
                zoomMin: 1,
                margin: { item: 4 },
            };

            this.timeline = new vis.Timeline(container, dataset, options);
        }
    };
}
</script>
{% endblock %}
