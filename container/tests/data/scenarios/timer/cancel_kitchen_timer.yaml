id: timer.cancel_kitchen_timer
agent: timer-agent
description: Cancel the kitchen 5 minute timer
snapshot: home_default
language: en
context: {source: ha, area_id: kitchen, device_id: satellite_kitchen}
llm:
  classify: |
    timer-agent (95%): Cancel the kitchen timer
  agents:
    timer-agent: |
      Cancelling the kitchen timer.
      ```json
      {"action": "cancel_timer", "entity": "kitchen 5 minute", "parameters": {}}
      ```
request:
  text: "cancel the kitchen timer"
expected:
  routed_agent: timer-agent
  # AgentHub manages plain timers internally; no HA service calls. Without a
  # pre-existing scheduler timer the executor reports "No timer named ...",
  # which still contains the substring "timer" we assert on.
  service_calls: []
  speech_contains: ["timer"]
