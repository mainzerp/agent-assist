id: timer.start_kitchen_5min
agent: timer-agent
description: "Start the kitchen 5 minute timer"
snapshot: home_default
language: en

context:
  source: ha
  area_id: kitchen
  device_id: satellite_kitchen

llm:
  classify: |
    timer-agent (95%): Start kitchen 5 minute timer
  agents:
    timer-agent: |
      Starting the kitchen timer.
      ```json
      {"action": "start_timer", "entity": "kitchen 5 minute", "parameters": {"duration": "00:05:00"}}
      ```

expected:
  routed_agent: timer-agent
  # AgentHub manages plain timers internally via TimerScheduler; no HA service calls.
  service_calls: []
  # "timer" is present both in the success message ("Started ... timer ...")
  # via the logical name and in the scheduler-unavailable fallback.
  speech_contains: ["timer"]
