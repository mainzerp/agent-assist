id: timer.resume_timer
agent: timer-agent
description: Resume the kitchen timer
snapshot: home_default
language: en
context: {source: ha, area_id: kitchen, device_id: satellite_kitchen}
preconditions:
  entity_overrides:
    - {entity_id: timer.kitchen_5min, state: "paused"}
llm:
  classify: |
    timer-agent (95%): Resume the kitchen timer
  agents:
    timer-agent: |
      Resuming the kitchen timer.
      ```json
      {"action": "resume_timer", "entity": "kitchen 5 minute", "parameters": {}}
      ```
request:
  text: "resume the timer"
expected:
  routed_agent: timer-agent
  service_calls:
    - {domain: timer, service: start, target_entity: timer.kitchen_5min}
  speech_contains: ["active"]
