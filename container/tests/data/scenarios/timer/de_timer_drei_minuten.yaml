id: timer.de_timer_drei_minuten
agent: timer-agent
description: German request to start a generic 3 minute timer
snapshot: home_default
language: de

context:
  source: ha
  area_id: kitchen
  area_name: "Kueche"
  device_id: satellite_kitchen

request:
  text: "Stelle einen Timer auf 3 Minuten."

llm:
  classify: |
    timer-agent (95%): Stelle einen Timer auf 3 Minuten
  agents:
    timer-agent: |
      ```json
      {"action": "start_timer", "entity": "Dreiminutentimer", "parameters": {"duration": "00:03:00"}}
      ```
      Ich starte den Timer.

expected:
  routed_agent: timer-agent
  # AgentHub manages plain timers internally via TimerScheduler; no HA service calls.
  service_calls: []
  speech_contains: ["timer"]
  speech_excludes: ["could not verify", "could not understand"]
# TODO: add a sibling scenario covering eligibility=true native delegation
# (LLM stub returns delegate_native_plain_timer; assertion expects directive in response).
