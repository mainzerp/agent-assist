    - {entity_id: media_player.living_room_tv, state: "off"}
llm:
  classify: |
    media-agent (95%): Turn on the living room TV
  agents:
    media-agent: |
      Turning on the living room TV.
      ```json
      {"action": "turn_on", "entity": "living room tv", "parameters": {}}
      ```
request:
