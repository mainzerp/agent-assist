id: media.pause_living_room_tv
agent: media-agent
description: "Pause the living room TV"
snapshot: home_default
language: en

context:
  source: ha
  area_id: living_room
  device_id: satellite_living_room

preconditions:
  entity_overrides:
    - entity_id: media_player.living_room_tv
      state: "playing"

llm:
  classify: |
    media-agent (95%): Pause the living room TV
  agents:
    media-agent: |
      Pausing the living room TV.
      ```json
      {"action": "pause", "entity": "living room tv", "parameters": {}}
      ```

expected:
  routed_agent: media-agent
  service_calls:
    - domain: media_player
      service: media_pause
      target_entity: media_player.living_room_tv
  speech_contains: ["pause"]
