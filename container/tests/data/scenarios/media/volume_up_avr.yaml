id: media.volume_up_avr
agent: media-agent
description: Set the AVR volume to 60 percent
snapshot: home_default
language: en
context: {source: ha, area_id: living_room, device_id: satellite_living_room}
llm:
  classify: |
    media-agent (95%): Raise the living room AVR volume to 60 percent
  agents:
    media-agent: |
      Raising the AVR volume.
      ```json
      {"action": "set_volume", "entity": "living room avr", "parameters": {"volume_level": 0.6}}
      ```
request:
  text: "turn up the AVR volume"
expected:
  routed_agent: media-agent
  service_calls:
    - domain: media_player
      service: volume_set
      target_entity: media_player.living_room_avr
      service_data: {volume_level: 0.6}
  speech_contains: ["volume"]
