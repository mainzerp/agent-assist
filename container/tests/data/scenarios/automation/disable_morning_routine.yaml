id: automation.disable_morning_routine
agent: automation-agent
description: Disable the morning routine automation
snapshot: home_default
language: en
context: {source: ha, area_id: kitchen, device_id: satellite_kitchen}
preconditions:
  entity_overrides:
    - {entity_id: automation.morning_routine, state: "on"}
llm:
  classify: |
    automation-agent (95%): Disable the morning routine automation
  agents:
    automation-agent: |
      Disabling the morning routine.
      ```json
      {"action": "disable_automation", "entity": "morning routine", "parameters": {}}
      ```
request:
  text: "disable the morning routine"
expected:
  routed_agent: automation-agent
  service_calls:
    - {domain: automation, service: turn_off, target_entity: automation.morning_routine}
  speech_contains: ["morning"]
