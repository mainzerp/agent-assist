id: automation.enable_morning_routine
agent: automation-agent
description: Enable the morning routine automation
snapshot: home_default
language: en
context: {source: ha, area_id: kitchen, device_id: satellite_kitchen}
preconditions:
  entity_overrides:
    - {entity_id: automation.morning_routine, state: "off"}
llm:
  classify: |
    automation-agent (95%): Enable the morning routine automation
  agents:
    automation-agent: |
      Enabling the morning routine.
      ```json
      {"action": "enable_automation", "entity": "morning routine", "parameters": {}}
      ```
request:
  text: "enable the morning routine"
expected:
  routed_agent: automation-agent
  service_calls:
    - {domain: automation, service: turn_on, target_entity: automation.morning_routine}
  speech_contains: ["morning"]
